name: 🚀 Deploy MedFind Bangladesh

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  # ── Job 1: Quick syntax check ────────────────────────────
  lint-check:
    name: 🔍 Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          cd backend
          pip install pyflakes --quiet
          python -m pyflakes medfind_project/settings_render.py || true
          python -c "
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ['__pycache__','migrations','.git','venv','env']]
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          ast.parse(open(path).read())
                      except SyntaxError as e:
                          errors.append(f'{path}: {e}')
          if errors:
              print('SYNTAX ERRORS FOUND:')
              for e in errors: print(e)
              sys.exit(1)
          else:
              print('✅ All Python files syntax OK')
          "
          echo "✅ Lint check passed"

