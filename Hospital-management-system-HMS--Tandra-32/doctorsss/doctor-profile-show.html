<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Popup — ডাক্তারের প্রোফাইল</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #e0dcd4;
    --border-dark: #c8c3b8;
    --text: #1a1814;
    --text-muted: #6b6560;
    --text-light: #9c9690;
    --blue: #1a5fb4;
    --blue-bg: #e8f0fb;
    --blue-border: #a8c4ef;
    --green: #2d7d46;
    --green-bg: #e6f4eb;
    --red: #b43030;
    --red-bg: #fbe8e8;
    --amber: #8a5c00;
    --amber-bg: #fdf3d8;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border: 1px solid var(--border-dark);
    border-radius: 8px;
    background: transparent;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    text-decoration: none;
    transition: all .15s;
  }
  .back-btn:hover { background: var(--surface2); color: var(--text); }
  .back-btn svg { width: 14px; height: 14px; }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--blue);
  }
  .breadcrumb {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-light);
  }
  .breadcrumb a { color: var(--blue); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }

  /* ── PAGE ── */
  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── PROFILE HERO ── */
  .profile-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 1.5rem;
  }

  .hero-banner {
    height: 100px;
    background: linear-gradient(135deg, #e8f0fb 0%, #d4e4f7 50%, #c0d8f4 100%);
    position: relative;
  }
  .hero-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231a5fb4' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .hero-content {
    padding: 0 28px 24px;
    position: relative;
  }

  .big-avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 4px solid var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    margin-top: -44px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-lg);
  }

  .profile-top-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .doc-name {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .doc-spec {
    font-size: 15px;
    font-weight: 600;
    color: var(--blue);
    margin-bottom: 4px;
  }
  .doc-hospital {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .doc-edu {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 3px;
  }

  .avail-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .avail-badge.yes { background: var(--green-bg); color: var(--green); }
  .avail-badge.no  { background: var(--red-bg);   color: var(--red); }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot-green { background: var(--green); }
  .dot-red   { background: var(--red); }

  /* ── STAT CARDS ── */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  @media(max-width:640px) { .stat-row { grid-template-columns: repeat(2,1fr); } }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-icon { font-size: 22px; margin-bottom: 6px; }
  .stat-value { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .stat-label { font-size: 11px; color: var(--text-muted); }

  /* ── SECTION ── */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow);
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .section-title-icon {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--blue-bg);
    color: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
  }

  .about-text {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.8;
  }

  /* ── INFO GRID ── */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media(max-width:480px) { .info-grid { grid-template-columns: 1fr; } }

  .info-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px;
    border-radius: 8px;
    background: var(--surface2);
  }
  .info-key {
    font-size: 11px;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: .4px;
    margin-bottom: 3px;
  }
  .info-val {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  /* ── SLOTS ── */
  .slots-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .slot-btn {
    padding: 8px 16px;
    border: 1px solid var(--border-dark);
    border-radius: 8px;
    background: var(--surface);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s;
  }
  .slot-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
  .slot-btn.picked { background: var(--blue); color: #fff; border-color: var(--blue); }

  /* ── REVIEWS ── */
  .reviews-list { display: flex; flex-direction: column; gap: 10px; }
  .review-card {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px 16px;
  }
  .rev-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .rev-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--blue-bg);
    color: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .rev-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .rev-stars { font-size: 12px; color: #e6a817; margin-left: auto; }
  .rev-text { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

  /* ── BOOK SECTION ── */
  .book-section {
    background: linear-gradient(135deg, #1a5fb4 0%, #1248a0 100%);
    border-radius: 14px;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    box-shadow: var(--shadow-lg);
  }
  .book-left h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: #fff;
    margin-bottom: 4px;
  }
  .book-left p { font-size: 13px; color: rgba(255,255,255,0.75); }
  .book-right { display: flex; gap: 10px; }
  .btn-primary {
    padding: 11px 24px;
    background: #fff;
    color: var(--blue);
    border: none;
    border-radius: 8px;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
    white-space: nowrap;
  }
  .btn-primary:hover { transform: scale(1.02); box-shadow: 0 4px 14px rgba(0,0,0,0.18); }
  .btn-secondary {
    padding: 11px 20px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 8px;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.25); }

  /* ── SELECTED SLOT TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1814;
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    transition: transform .3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── NOT FOUND ── */
  .not-found {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--text-muted);
  }
  .not-found h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }

  @media(max-width:600px) {
    .page { padding: 1rem 1rem 3rem; }
    .hero-content { padding: 0 16px 20px; }
    .doc-name { font-size: 20px; }
    .book-section { flex-direction: column; }
    .book-right { width: 100%; flex-direction: column; }
    .btn-primary, .btn-secondary { width: 100%; text-align: center; }
    .breadcrumb { display: none; }
  }
</style>
</head>

function stars(r) {
  let s = '';
  for (let i = 1; i <= 5; i++) s += i <= Math.round(r) ? '★' : '☆';
  return s;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function pickSlot(btn, slot) {
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('picked'));
  btn.classList.add('picked');
  showToast('✓ ' + slot + ' সময়টি বেছে নেওয়া হয়েছে');
}

function bookNow(name) {
  const picked = document.querySelector('.slot-btn.picked');

    showToast('অনুগ্রহ করে আগে একটি সময় বেছে নিন');
    return;
  }
  showToast('✓ ' + picked.textContent + ' — অ্যাপয়েন্টমেন্ট নিশ্চিত করা হয়েছে!');
}
