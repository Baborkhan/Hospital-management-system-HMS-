<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booking - MedFind</title>
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .booking-page {
            padding: 2rem 0;
            background: #f9fafb;
            min-height: calc(100vh - 70px);
        }
        .booking-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        .booking-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            margin-bottom: 2rem;
        }
        .booking-title {
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 1rem;
            text-align: center;
        }
        .booking-form {
            display: grid;
            gap: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        .form-input, .form-select, .form-textarea {
            padding: 0.875rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.875rem;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }
        .doctor-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .doctor-card {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .doctor-card:hover, .doctor-card.selected {
            border-color: #2563eb;
            background: #dbeafe;
        }
        .doctor-name {
            font-weight: 600;
            color: #111827;
        }
        .doctor-specialty {
            color: #6b7280;
            font-size: 0.875rem;
        }
        .doctor-fee {
            color: #059669;
            font-weight: 500;
        }
        .submit-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: #1d4ed8;
        }
        .submit-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="../basics/index.html">MedFind</a>
            </div>
            <div class="nav-menu">
                <a href="../basics/index.html">Home</a>
                <a href="../basics/doctor-search.html">Find Doctors</a>
                <a href="patient-deshboard.html">Dashboard</a>
                <a href="../basics/login.html">Login</a>
            </div>
        </div>
    </nav>

    <div class="booking-page">
        <div class="booking-container">
            <div class="booking-card">
                <h1 class="booking-title">Book Your Appointment</h1>
                <form class="booking-form" id="appointmentForm" action="/api/appointment-book/" method="POST">
                    <div class="form-group">
                        <label class="form-label">Patient Information</label>
                        <input type="text" class="form-input" name="patient_name" placeholder="Full Name" required>
                        <input type="email" class="form-input" name="patient_email" placeholder="Email Address" required>
                        <input type="tel" class="form-input" name="patient_phone" placeholder="Phone Number" required>
                        <input type="date" class="form-input" name="patient_dob" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Select Doctor</label>
                        <div class="doctor-selection" id="doctorSelection">
                            <!-- Doctors will be loaded here -->
                        </div>
                        <input type="hidden" name="doctor_id" id="selectedDoctorId" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Appointment Details</label>
                        <input type="date" class="form-input" name="appointment_date" required>
                        <select class="form-select" name="appointment_time" required>
                            <option value="">Select Time</option>
                            <option value="09:00">9:00 AM</option>
                            <option value="10:00">10:00 AM</option>
                            <option value="11:00">11:00 AM</option>
                            <option value="14:00">2:00 PM</option>
                            <option value="15:00">3:00 PM</option>
                            <option value="16:00">4:00 PM</option>
                        </select>
                        <select class="form-select" name="appointment_type" required>
                            <option value="">Appointment Type</option>
                            <option value="consultation">Consultation</option>
                            <option value="follow-up">Follow-up</option>
                            <option value="emergency">Emergency</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Symptoms/Reason for Visit</label>
                        <textarea class="form-textarea" name="symptoms" placeholder="Describe your symptoms or reason for the appointment" required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Medical History (Optional)</label>
                        <textarea class="form-textarea" name="medical_history" placeholder="Any relevant medical history, allergies, or current medications"></textarea>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">Book Appointment</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Load doctors from backend
        async function loadDoctors() {
            try {
                const response = await fetch('/api/doctors/');
                const doctors = await response.json();
                const container = document.getElementById('doctorSelection');
                
                doctors.forEach(doctor => {
                    const card = document.createElement('div');
                    card.className = 'doctor-card';
                    card.innerHTML = `
                        <div class="doctor-name">${doctor.name}</div>
                        <div class="doctor-specialty">${doctor.specialty}</div>
                        <div class="doctor-fee">৳ ${doctor.fee}</div>
                    `;
                    card.addEventListener('click', () => {
                        document.querySelectorAll('.doctor-card').forEach(c => c.classList.remove('selected'));
                        card.classList.add('selected');
                        document.getElementById('selectedDoctorId').value = doctor._id;
                    });
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading doctors:', error);
            }
        }

        // Handle form submission
        document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Booking...';

            try {
                const formData = new FormData(e.target);
                const response = await fetch('/api/appointment-book/', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const result = await response.json();
                    alert('Appointment booked successfully!');
                    window.location.href = 'patient-deshboard.html';
                } else {
                    const error = await response.json();
                    alert('Error: ' + error.error);
                }
            } catch (error) {
                alert('Error booking appointment: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Book Appointment';
            }
        });

        // Load doctors on page load
        loadDoctors();
    </script>
</body>
</html>
