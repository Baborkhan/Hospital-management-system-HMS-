# MedFind — Nginx Production Configuration
# Place at: /etc/nginx/sites-available/medfind
# Enable: sudo ln -s /etc/nginx/sites-available/medfind /etc/nginx/sites-enabled/

upstream django_http {
    server 127.0.0.1:8000;   # Gunicorn (HTTP)
}

upstream django_ws {
    server 127.0.0.1:8001;   # Daphne (WebSocket / WebRTC signaling)
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name medfind.app www.medfind.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name medfind.app www.medfind.app;

    # ── SSL ──────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/medfind.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medfind.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Static files (served by Nginx directly) ──────────────────
    location /static/ {
        alias /var/www/medfind/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── WebSocket — WebRTC signaling ─────────────────────────────
    location /ws/ {
        proxy_pass         http://django_ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400;   # Keep WS alive for long video calls
    }

    # ── API + Django ─────────────────────────────────────────────
    location / {
        proxy_pass         http://django_http;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 50M;   # Allow medical file uploads up to 50MB
    }
}
