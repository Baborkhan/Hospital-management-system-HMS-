<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Profile - MEDFIND</title>
    <link rel="stylesheet" href="../assetsCSS/base.css">
    <link rel="stylesheet" href="../assetsCSS/components.css">
    <link rel="stylesheet" href="../assetsCSS/layout.css">
    <link rel="stylesheet" href="../assetsCSS/responsive.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .doctor-popup {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .popup-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .doctor-header-content {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }

        .doctor-image {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            object-fit: cover;
            border: 3px solid white;
        }

        .doctor-header-info h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .doctor-title {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .doctor-rating {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-top: 0.5rem;
        }

        .stars {
            color: #ffd700;
            font-size: 1rem;
        }

        .popup-body {
            padding: 2rem;
        }

        .info-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::before {
            content: '▸';
            color: #667eea;
            font-size: 1.5rem;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid #eee;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 500;
            color: #666;
        }

        .info-value {
            color: #333;
            font-weight: 600;
        }

        .specializations {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .spec-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .qualifications-list {
            list-style: none;
        }

        .qualifications-list li {
            padding: 0.5rem 0;
            color: #333;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .qualifications-list li::before {
            content: '✓';
            color: #667eea;
            font-weight: bold;
        }

        .available-days {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .day-badge {
            background: #f0f0f0;
            color: #333;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .fee-section {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1.5rem 0;
        }

        .fee-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .fee-amount {
            font-size: 2rem;
            font-weight: bold;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 3rem 2rem;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid #c33;
        }

        .bio-text {
            color: #666;
            line-height: 1.6;
            font-style: italic;
            margin: 1rem 0;
            padding: 1rem;
            background: #f9f9f9;
            border-left: 3px solid #667eea;
            border-radius: 4px;
        }

        .hospital-info {
            background: #f0f7ff;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #667eea;
        }

        .hospital-info strong {
            color: #667eea;
        }

        @media (max-width: 600px) {
            .doctor-popup {
                margin: 1rem;
            }

            .doctor-header-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .doctor-header-info h2 {
                font-size: 1.5rem;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .fee-section {
                flex-direction: column;
                gap: 1rem;
            }

            .popup-header {
                padding: 1.5rem;
            }

            .popup-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="modal-overlay">
        <div class="doctor-popup" id="doctorPopup">
            <!-- Loading State -->
            <div id="loadingState" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading doctor information...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" style="display: none; padding: 2rem;">
                <div class="error-message" id="errorMessage"></div>
                <button class="btn btn-secondary" onclick="goBack()" style="margin-top: 1rem; width: 100%;">
                    Go Back
                </button>
            </div>

            <!-- Content State -->
            <div id="contentState" style="display: none;">
                <!-- Header -->
                <div class="popup-header">
                    <button class="close-btn" onclick="closePopup()">×</button>
                    <div class="doctor-header-content">
                        <img id="doctorImage" src="https://via.placeholder.com/100" alt="Doctor" class="doctor-image">
                        <div class="doctor-header-info">
                            <h2 id="doctorName">Dr. John Smith</h2>
                            <div class="doctor-title" id="doctorSpecialization">Cardiology</div>
                            <div class="doctor-rating">
                                <span class="stars" id="doctorRating">★★★★★</span>
                                <span id="reviewCount">(0 reviews)</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Body -->
                <div class="popup-body">
                    <!-- Bio -->
                    <div class="info-section" id="bioSection" style="display: none;">
                        <p class="bio-text" id="doctorBio"></p>
                    </div>

                    <!-- Hospital Information -->
                    <div class="info-section" id="hospitalSection">
                        <div class="section-title">Hospital</div>
                        <div class="hospital-info">
                            <strong id="hospitalName">Hospital Name</strong>
                            <div id="hospitalPhone" style="color: #666; margin-top: 0.5rem;">
                                📞 Contact
                            </div>
                        </div>
                    </div>

                    <!-- Consultation Fee -->
                    <div class="fee-section">
                        <div class="fee-label">Consultation Fee</div>
                        <div class="fee-amount" id="consultationFee">$150</div>
                    </div>

                    <!-- Qualifications -->
                    <div class="info-section" id="qualificationsSection">
                        <div class="section-title">Qualifications</div>
                        <ul class="qualifications-list" id="qualificationsList">
                            <li>MD</li>
                            <li>Board Certified</li>
                        </ul>
                    </div>

                    <!-- Experience -->
                    <div class="info-section">
                        <div class="info-item">
                            <span class="info-label">Experience</span>
                            <span class="info-value" id="experienceYears">15 years</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">License Number</span>
                            <span class="info-value" id="licenseNumber">MD-12345</span>
                        </div>
                    </div>

                    <!-- Available Days -->
                    <div class="info-section" id="availabilitySection">
                        <div class="section-title">Available Days</div>
                        <div class="available-days" id="availableDaysList">
                            <div class="day-badge">Monday</div>
                            <div class="day-badge">Wednesday</div>
                            <div class="day-badge">Friday</div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="bookAppointment()">
                            📅 Book Appointment
                        </button>
                        <button class="btn btn-secondary" onclick="viewProfile()">
                            👤 Full Profile
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Include API Client -->
    <script src="../JSprogram/api-client.js"></script>

    <script>
        let currentDoctor = null;

        // Get doctor ID from URL parameters
        function getDoctorIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // Load doctor data
        async function loadDoctorData() {
            const doctorId = getDoctorIdFromURL();
            
            if (!doctorId) {
                showError('No doctor ID provided');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch(`http://localhost:8000/api/doctors/${doctorId}/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    }
                });

                if (!response.ok) {
                    throw new Error(`Doctor not found (${response.status})`);
                }

                const doctor = await response.json();
                currentDoctor = doctor;
                displayDoctorData(doctor);
                showLoading(false);
                document.getElementById('contentState').style.display = 'block';
            } catch (error) {
                console.error('Error loading doctor:', error);
                showError(`Failed to load: ${error.message}`);
                showLoading(false);
            }
        }

        // Display doctor data in popup
        function displayDoctorData(doctor) {
            try {
                // Header Info
                document.getElementById('doctorName').textContent = `Dr. ${doctor.first_name} ${doctor.last_name}`;
                document.getElementById('doctorSpecialization').textContent = doctor.specialization;
                document.getElementById('doctorImage').src = doctor.profile_image || 'https://via.placeholder.com/100?text=Doctor';
                document.getElementById('doctorImage').alt = `Dr. ${doctor.first_name}`;
                
                // Rating
                const rating = doctor.rating || 0;
                const stars = getStarRating(rating);
                document.getElementById('doctorRating').textContent = stars;
                document.getElementById('reviewCount').textContent = `(${doctor.review_count || 0} reviews)`;

                // Bio
                if (doctor.bio && doctor.bio.trim()) {
                    document.getElementById('doctorBio').textContent = doctor.bio;
                    document.getElementById('bioSection').style.display = 'block';
                } else {
                    document.getElementById('bioSection').style.display = 'none';
                }

                // Hospital
                if (doctor.hospital) {
                    document.getElementById('hospitalName').textContent = doctor.hospital.name || 'Hospital';
                    document.getElementById('hospitalPhone').innerHTML = `📞 ${doctor.hospital.phone || 'N/A'}<br><small>${doctor.hospital.email || ''}</small>`;
                }

                // Consultation Fee
                document.getElementById('consultationFee').textContent = `$${parseFloat(doctor.consultation_fee || 0).toFixed(2)}`;

                // Qualifications
                if (doctor.qualifications && doctor.qualifications.length > 0) {
                    const qualList = document.getElementById('qualificationsList');
                    qualList.innerHTML = doctor.qualifications.map(q => `<li>${q}</li>`).join('');
                }

                // Experience
                document.getElementById('experienceYears').textContent = `${doctor.experience_years || 0} years`;

                // License Number
                document.getElementById('licenseNumber').textContent = doctor.license_number || 'N/A';

                // Available Days
                if (doctor.available_days && doctor.available_days.length > 0) {
                    const daysList = document.getElementById('availableDaysList');
                    daysList.innerHTML = doctor.available_days.map(day => `<div class="day-badge">${day}</div>`).join('');
                }

                showLoading(false);
            } catch (error) {
                console.error('Error displaying doctor data:', error);
                showError('Error displaying doctor information');
            }
        }

        // Get star rating display
        function getStarRating(rating) {
            const fullStars = Math.floor(rating);
            const hasHalfStar = rating % 1 !== 0;
            let stars = '★'.repeat(fullStars);
            if (hasHalfStar) stars += '½';
            stars += '☆'.repeat(5 - Math.ceil(rating));
            return stars;
        }

        // Show/hide loading state
        function showLoading(show) {
            document.getElementById('loadingState').style.display = show ? 'block' : 'none';
        }

        // Show error state
        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorState').style.display = 'block';
        }

        // Close popup
        function closePopup() {
            window.history.back();
        }

        // Go back
        function goBack() {
            window.history.back();
        }

        // Book appointment
        function bookAppointment() {
            if (!currentDoctor) {
                showError('Doctor information not loaded');
                return;
            }
            
            const hospitalId = currentDoctor.hospital?.id || '';
            const doctorId = currentDoctor.id;
            window.location.href = `../Patients/appointment-booking.html?doctor_id=${doctorId}&hospital_id=${hospitalId}`;
        }

        // View full profile
        function viewProfile() {
            if (!currentDoctor) {
                showError('Doctor information not loaded');
                return;
            }
            window.location.href = `doctor-schedule.html?id=${currentDoctor.id}`;
        }

        // Close on overlay click
        document.querySelector('.modal-overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closePopup();
            }
        });

        // Load data on page load
        document.addEventListener('DOMContentLoaded', loadDoctorData);
    </script>
</body>
</html>
