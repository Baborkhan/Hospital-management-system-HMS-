# ═══════════════════════════════════════════════════════════
#  MedFind Bangladesh — Render.com Auto-Deploy Config
# ═══════════════════════════════════════════════════════════
services:
  - type: web
    name: medfind-backend
    runtime: python
    rootDir: backend
    # Auto-deploy on every push to main branch
    autoDeploy: true
    buildCommand: >
      pip install -r requirements_render.txt &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput
    startCommand: >
      gunicorn medfind_project.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --timeout 120
      --access-logfile -
      --error-logfile -
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: medfind_project.settings_render
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,medfind-bangladesh-ai-healthcare-platform.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://medfind-bangladesh.web.app,https://www.medfind-bangladesh.com,https://medfind-bangladesh-ai-healthcare-platform.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://medfind-bangladesh-ai-healthcare-platform.onrender.com,https://medfind-bangladesh.web.app,https://www.medfind-bangladesh.com"
      # ── Set these manually in Render Dashboard → Environment ──
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false   # ← Add in Render Dashboard: AIzaSyAJGKkaMB4ixVPmd5r-cRR1e5ea4AxKmwQ
      - key: ANTHROPIC_API_KEY
        sync: false   # ← Add in Render Dashboard (fallback)
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
